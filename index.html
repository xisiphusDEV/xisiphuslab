<!DOCTYPE HTML>
<html>
<head>
    <title>XisiphusLAB</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#0A2540">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="XisiphusLAB builds XR, AI, and Digital Twin technologies for intelligent systems." />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* 로딩 연출 스타일 */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #050505;
        }

        #loading-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            pointer-events: none;
            color: #98FF3D; /* 네온 그린 적용 */
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(152, 255, 61, 0.5);
        }

        .status-box {
            text-align: center;
            letter-spacing: 0.2em;
        }

        /* 좌표 오버레이: 우측 하단 고정 */
        .coord-overlay {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 11px;
            text-align: right;
            line-height: 1.5;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* 초기 상태 콘텐츠 숨김 */
        body.is-loading #header, 
        body.is-loading #main, 
        body.is-loading #footer {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        #header, #main, #footer {
            opacity: 0;
            visibility: hidden;
            transition: opacity 2s ease-in-out, visibility 2s ease-in-out;
        }
    </style>
</head>

<body class="is-preload is-loading">

<canvas id="webgl-canvas"></canvas>
<div id="loading-ui">
    <div class="status-box">
        <div id="status-msg">SOLVING THE X...</div>
    </div>
    <div class="coord-overlay">
        X_CORE_SYNC: <span id="x-val">0.000</span><br>
        Y_CORE_SYNC: <span id="y-val">0.000</span><br>
        Z_CORE_SYNC: <span id="z-val">0.000</span>
    </div>
</div>

<section id="header">...</section>
<section id="main">...</section>
<section id="footer">...</section>

<script src="assets/js/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>

<script>
    let scene, camera, renderer, points;
    const particleCount = 6500; // 두께감을 위해 입자 수 증설
    const targetCoords = [];
    const currentCoords = [];

    function initXAnimation() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('webgl-canvas'), 
            antialias: true,
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 15;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 15;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 15;
            currentCoords.push({ x: positions[i * 3], y: positions[i * 3 + 1], z: positions[i * 3 + 2] });

            let tx, ty, tz;
            const branch = i < particleCount * 0.5 ? 1 : -1;
            const t = (Math.random() - 0.5) * 4.8;
            tx = t;
            ty = branch * t * 1.2;
            
            // X의 두께감 강화
            tx += (Math.random() - 0.5) * 0.5; 
            ty += (Math.random() - 0.5) * 0.5;
            tz = (Math.random() - 0.5) * 0.4;
            
            targetCoords.push({ x: tx, y: ty, z: tz });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // 포인트 컬러 적용: 0x98FF3D (네온 그린)
        const material = new THREE.PointsMaterial({ 
            color: 0x98FF3D, 
            size: 0.022, 
            transparent: true, 
            blending: THREE.AddBlending,
            depthTest: false
        });
        
        points = new THREE.Points(geometry, material);
        scene.add(points);
        animatePoints();
    }

    function animatePoints() {
        const positions = points.geometry.attributes.position.array;
        const tl = gsap.timeline({ onComplete: finishLoading });

        for (let i = 0; i < particleCount; i++) {
            tl.to(currentCoords[i], {
                duration: 3.5,
                x: targetCoords[i].x,
                y: targetCoords[i].y,
                z: targetCoords[i].z,
                ease: "expo.inOut",
                onUpdate: () => {
                    positions[i * 3] = currentCoords[i].x;
                    positions[i * 3 + 1] = currentCoords[i].y;
                    positions[i * 3 + 2] = currentCoords[i].z;
                    points.geometry.attributes.position.needsUpdate = true;
                    if(i === 0) {
                        document.getElementById('x-val').innerText = currentCoords[i].x.toFixed(3);
                        document.getElementById('y-val').innerText = currentCoords[i].y.toFixed(3);
                        document.getElementById('z-val').innerText = currentCoords[i].z.toFixed(3);
                    }
                }
            }, 0);
        }

        tl.to("body", { duration: 1.5, backgroundColor: "#ffffff", ease: "power2.inOut" }, "-=1.0");
        tl.to(points.material, { duration: 1.0, opacity: 0, ease: "power2.in" }, "-=0.6");
        tl.to("#loading-ui", { duration: 0.8, opacity: 0 }, "-=0.6");
    }

    function finishLoading() {
        gsap.to("#webgl-canvas", { 
            duration: 1.2, 
            opacity: 0, 
            onStart: () => {
                document.body.classList.remove('is-loading');
                document.body.classList.remove('is-preload');
                document.body.style.backgroundColor = ""; 
            },
            onComplete: () => {
                document.getElementById('webgl-canvas').style.display = 'none';
                const sections = ['#header', '#main', '#footer'];
                sections.forEach(sel => {
                    const el = document.querySelector(sel);
                    if(el) {
                        el.style.visibility = "visible";
                        el.style.opacity = "1";
                    }
                });
                const script = document.createElement('script');
                script.src = 'assets/js/main.js';
                document.body.appendChild(script);
            }
        });
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        if(points) points.rotation.y += 0.0018;
        renderer.render(scene, camera);
    }

    window.addEventListener('load', () => {
        initXAnimation();
        renderLoop();
    });
</script>
</body>
</html>
